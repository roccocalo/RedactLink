spring.application.name=redactlink

# AWS
aws.region=${AWS_REGION:us-east-1}
aws.s3.raw-bucket=${AWS_S3_RAW_BUCKET:redactlink-raw-uploads}
aws.s3.sanitized-bucket=${AWS_S3_SANITIZED_BUCKET:redactlink-sanitized-files}
aws.sqs.queue-url=${AWS_SQS_QUEUE_URL:}

# Redis
spring.data.redis.url=${REDIS_URL:redis://localhost:6379}

# Presidio
presidio.analyzer.url=${PRESIDIO_ANALYZER_URL:http://localhost:5002}

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Upload limits
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
